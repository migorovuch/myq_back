# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
#parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']
    App\Model\Manager\AbstractCRUDManager:
        abstract: true
        autowire: true

    App\Util\Adapter\JMS\RelationsHandler:
        class: App\Util\Adapter\JMS\RelationsHandler
        autowire: true
        tags:
            - { name: jms_serializer.handler, type: Relation, direction: serialization, format: json, method: serializeRelation}
            - { name: jms_serializer.handler, type: Relation, direction: deserialization, format: json, method: deserializeRelation}
            - { name: jms_serializer.handler, type: Relation<?>, direction: serialization, format: json, method: serializeRelation}
            - { name: jms_serializer.handler, type: Relation<?>, direction: deserialization, format: json, method: deserializeRelation}

    App\EventSubscriber\SerializerSubscriber:
        class: App\EventSubscriber\SerializerSubscriber
        arguments:
            - "@validator"
        tags:
            - { name: jms_serializer.event_subscriber }

    acme_api.event.authentication_success_listener:
        class: App\EventListener\AuthenticationSuccessListener
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onAuthenticationSuccessResponse }

    acme_api.event.authentication_failure_listener:
        class: App\EventListener\AuthenticationFailureListener
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_failure, method: onAuthenticationFailureResponse }

    App\EventSubscriber\ApiExceptionSubscriber:
        class: App\EventSubscriber\ApiExceptionSubscriber
        tags:
            - { name: kernel.event_subscriber, event: kernel.exception }
        arguments:
            $appEnv: '%env(string:APP_ENV)%'

    App\EventSubscriber\RequestLocaleSubscriber:
        class: App\EventSubscriber\RequestLocaleSubscriber
        tags:
            - { name: kernel.event_subscriber }
        arguments:
            $appLocales: '%env(string:SUPPORTED_LOCALE)%'

    App\Util\Request\QueryParamConverter:
        class: App\Util\Request\QueryParamConverter
        autowire: true
        tags:
            - { name: request.param_converter, priority: 2, converter: query_converter }

    App\Model\Manager\UserManagerInterface:
        class: App\Model\Manager\UserManager
        arguments:
            $appName: '%env(string:APP_NAME)%'
            $appEmail: '%env(string:APP_EMAIL)%'
            $appUrl: '%env(string:VUE_APP_APP_URL)%'
            $appEnv: '%env(string:APP_ENV)%'
            $signingKey: '%env(string:SIGNING_KEY)%'

    gedmo.listener.timestampable:
        class: Gedmo\Timestampable\TimestampableListener
        tags:
            - { name: doctrine.event_subscriber, connection: default }
        calls:
            - [ setAnnotationReader, [ '@annotation_reader' ] ]

    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%kernel.project_dir%/public/media'
