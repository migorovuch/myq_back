# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:
    app_name: '%env(string:APP_NAME)%'
    app_email: '%env(string:APP_EMAIL)%'
    upload_directory: '%kernel.project_dir%/public/media'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']
    App\Model\Manager\AbstractCRUDManager:
        abstract: true
        autowire: true

    App\Util\DTOExporter\DTOExporterInterface: '@App\Util\DTOExporter\DTOExporter'
    App\Util\DTOExporter\DTOExporterInterface $userDtoExporter: '@App\Util\DTOExporter\UserDTOExporter'
    App\Util\DTOExporter\DTOExporterInterface $companyDtoExporter: '@App\Util\DTOExporter\CompanyDTOExporter'
    App\Util\DTOExporter\DTOExporterInterface $scheduleDtoExporter: '@App\Util\DTOExporter\ScheduleDTOExporter'
    App\Util\DTOExporter\DTOExporterInterface $specialHoursDtoExporter: '@App\Util\DTOExporter\SpecialHoursDTOExporter'

    App\Util\Adapter\JMS\RelationsHandler:
        class: App\Util\Adapter\JMS\RelationsHandler
        autowire: true
        tags:
            - { name: jms_serializer.handler, type: Relation, direction: serialization, format: json, method: serializeRelation}
            - { name: jms_serializer.handler, type: Relation, direction: deserialization, format: json, method: deserializeRelation}
            - { name: jms_serializer.handler, type: Relation<?>, direction: serialization, format: json, method: serializeRelation}
            - { name: jms_serializer.handler, type: Relation<?>, direction: deserialization, format: json, method: deserializeRelation}

    App\EventSubscriber\SerializerSubscriber:
        class: App\EventSubscriber\SerializerSubscriber
        arguments:
            - "@validator"
        tags:
            - { name: jms_serializer.event_subscriber }

    App\EventSubscriber\ApiExceptionSubscriber:
        class: App\EventSubscriber\ApiExceptionSubscriber
        tags:
            - { name: kernel.event_subscriber, event: kernel.exception }
        arguments:
            $appDebug: '%env(int:APP_DEBUG)%'

    App\Util\Request\QueryParamConverter:
        class: App\Util\Request\QueryParamConverter
        autowire: true
        tags:
            - { name: request.param_converter, priority: 2, converter: query_converter }

    App\Model\Manager\UserManagerInterface:
        class: App\Model\Manager\UserManager
        arguments:
            $appName: '%app_name%'
            $appEmail: '%app_email%'

    gedmo.listener.timestampable:
        class: Gedmo\Timestampable\TimestampableListener
        tags:
            - { name: doctrine.event_subscriber, connection: default }
        calls:
            - [ setAnnotationReader, [ '@annotation_reader' ] ]

    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%upload_directory%'
