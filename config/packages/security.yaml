security:
    encoders:
        App\Entity\User:
            algorithm: bcrypt
    # https://symfony.com/doc/current/security.html#where-do-users-come-from-user-providers
    providers:
        in_memory: { memory: null }
        users:
            entity:
                # the class of the entity that represents users
                class: 'App\Entity\User'
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
#        main:
#            anonymous: true
#            lazy: true
#            provider: users_in_memory

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#firewalls-authentication

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true
        login:
            pattern: ^/api/login_check
            stateless: true
            anonymous: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                provider: users
        registration:
            pattern: ^/api/registration
            anonymous: true
        reset_password_request:
            pattern: ^/api/reset-password/request
            anonymous: true
        reset_password_reset:
            pattern: ^/api/reset-password/reset
            anonymous: true
        default:
            pattern:  ^/api
            stateless: true
            anonymous: true
            provider: users
            guard:
                authenticators:
                    - lexik_jwt_authentication.jwt_token_authenticator

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/api/login_check, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/registration, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/approve-email, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/reset-password/request, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/reset-password/reset, roles: IS_AUTHENTICATED_ANONYMOUSLY }
        - { path: ^/api/bookings/, roles: [IS_AUTHENTICATED_FULLY, IS_AUTHENTICATED_ANONYMOUSLY], methods: [POST] }
        - { path: ^/api/bookings/my, roles: [IS_AUTHENTICATED_FULLY, IS_AUTHENTICATED_ANONYMOUSLY], methods: [GET] }
        - { path: ^/api.*/app, roles: [IS_AUTHENTICATED_FULLY, IS_AUTHENTICATED_ANONYMOUSLY], methods: [GET] }
        - { path: ^/api/, roles: [IS_AUTHENTICATED_FULLY] }
