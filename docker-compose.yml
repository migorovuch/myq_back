version: '3.7'
services:
  mysql:
    image: mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports:
      - "3307:3306"
    env_file:
      - ./.env.local
    networks:
      - default_network
  php:
    build: docker/php-fpm
    volumes:
      - ./:/var/www/html:cached
      - ./var/logs/project:/var/www/html/var/log:cached
    networks:
      - default_network
    environment:
      PHP_IDE_CONFIG: "serverName=q.localhost"
      XDEBUG_CONFIG: "mode=debug start_with_request=yes client_host=host.docker.internal"
    env_file:
      - ./.env.local
  nginx:
    build: docker/nginx
    ports:
      - "80:80"
    volumes:
      - ./var/logs/nginx:/var/log/nginx:cached
      - ./:/var/www/html:cached
    networks:
      - default_network
